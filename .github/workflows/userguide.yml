name: Userguide

on:
  push:
    branches:
      - main

jobs:
  userguide:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Step0 - Check out the repository
        uses: actions/checkout@v4

      - name: Step1 - Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Step2 - Install python dependencies
        run: |
          cd userguide
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Step3 - Build user guide
        run: |
          cd userguide
          make html

      # Deploy to the organisation's GitHub Pages repo so the site is served
      # at https://ddolib-cetic-ucl.github.io/ (root, no /DDOLib/ prefix).
      #
      # Setup: generate an SSH deploy key and add the *public* key as a
      # deploy key (with write access) on DDOLIB-CETIC-UCL.github.io,
      # and the *private* key as a secret named PAGES_DEPLOY_KEY on DDOLib.
      - name: Step4 - Deploy to DDOLIB-CETIC-UCL.github.io
        uses: peaceiris/actions-gh-pages@v4
        with:
          deploy_key: ${{ secrets.PAGES_DEPLOY_KEY }}
          external_repository: DDOLIB-CETIC-UCL/DDOLIB-CETIC-UCL.github.io
          publish_branch: main
          publish_dir: ./userguide/build/html
          enable_jekyll: false
